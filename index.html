<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="This website helps you show everybody your birthday I guess??">
    <meta name="author" content="ParthTech8">
    <meta property="og:image" content="new-years-eve.png">
    <meta property="og:title" content="The Ultimate Countdown">
    <meta property="og:description" content="Just visit it and decide by yourself">
    <title>Birthday Countdown</title>
    <style>
      *
      {
        text-align: center;
        align-items: center;
        justify-content: center;
      }

      body 
      {
        text-align: center;
        background-color: #23c2ba;
        font-family: sans-serif;
        font-weight: 100;
        font-size: x-large;
        background-image: url("blast.gif");
        background-size: cover;
        background-repeat: no-repeat;
        background-image: none;
      }

      h1 
      {
        color: #2e928d;
        font-weight: 300;
        font-size: xx-large;
        margin: 40px 0px 20px;
      }

      .container
      {
        display: flex;
        flex-wrap: wrap;
        justify-content: space-between;
      }

      .images
      {
        margin-top: 53px;
        margin-left: 22px;
        display: flex;
        width: 35%;
        position: relative;
      }

      .images:hover .overlay
      {
        opacity: 0.8;
      }

      .images:hover #theImage
      {
        box-shadow: 1px 1px 40px #d3d3d3;
        filter: brightness(70%)
      }

      #theImage
      {
        border-radius: 22px;
        display: block;
      }

      #theImage:hover
      {
        opacity: 1;
      }

      .overlay
      {
        position: absolute;
        top: 0;
        bottom: 0;
        left: 0;
        right: 0;
        height: 100%;
        width: 100%;
        opacity: 0;
        transition: 0.8s ease-in;
        background-color: none;
      }

      .message
      {
        color: #ffffff;
        font-size: 1.7rem;
        position: absolute;
        top: 50%;
        left: 50%;
        -webkit-transform: translate(-50%, -50%);
        -ms-transform: translate(-50%, -50%);
        transform: translate(-50%, -50%);
        text-align: center;
      }

      .textContent
      {
        margin: 40px;
        flex: 1;
      }

      .headingName
      {
        color: #ff0000; 
        font-size: 6.2rem;
        font-weight: 500;
      }

      #clockDiv 
      {
        font-family: sans-serif;
        color: #fff;
        display: inline-block;
        font-weight: 100;
        text-align: center;
        font-size: xx-large;
      }

      .timeBox
      {
        margin: 8px;
        width: 134px;
        padding: 17px;
        border-radius: 10px;
        background: #1c9c95;
        display: inline-block;
      }
      .timeBox:hover
      {
        opacity: 0.9;
        box-shadow: 10px 10px 22px black;
      }

      #clockDiv > span 
      {
        padding: 15px;
        border-radius: 10px;
        background: #00816a;
        display: inline-block;
      }

      .smalltext 
      {
        padding-top: 8px;
        font-size: 2rem;
        font-weight: bold;
      }

      .getBold
      {
        font-weight: bolder;
      }

      @media screen and (max-width: 1589px)
      {
        .headingName
        {
          font-size: 4.4rem;
        }
      }

      @media screen and (max-width: 1316px)
      {
        .headingName
        {
          font-size: 4rem;
        }
      }

      @media screen and (max-width: 1256px)
      {
        .headingName
        {
          font-size: 3.5rem;
        }
      }

      @media screen and (max-width: 1181px)
      {
        .headingName
        {
          font-size: 3.1rem;
        }
      }

      @media screen and (max-width: 1024px)
      {
        .timeBox
        {
          margin: 6px;
          width: 100px;
          padding: 12px;
        }
      }

      @media screen and (max-width: 600px)
      {
        .headingName
        {
          color: #ff0000;
          font-size: 3.5rem;
        }

        .smalltext 
        {
          padding-top: 8px;
          font-size: 1.7rem;
        }

        .images
        {
          margin-left: 8px;
          width: 85%;
        }
        .textContent
        {
          margin: 20px auto;
          width: 85%;
        }
        .timeBox
        {
          margin: 8px;
          width: 103px;
          padding: 8px;
          border-radius: 10px;
          background: #1c9c95;
          display: inline-block;
        }
        
        .timeBox:hover
        {
          opacity: 0.9;
          box-shadow: 0.4px 0.4px 2.2px black;
        }
      }
    </style>
    <link rel="icon" href="new-years-eve.png" type="image/icon type">
  </head>
  <body>
    <div class="container">
      <div class="images">
        <image src="parth3.JPG" width="100%" alt="Somthing is missing" id="theImage"></image>
        <div class="overlay">
          <div class="message">Happy Birthday To ME!!<span style="font-size: small; top: 100%;">&nbsp-Parth</span><br><br></div>
        </div>
      </div>
      <div class="textContent">
        <h1>Time left in<br><span class="headingName">&nbsp&nbspPradyumna's Birthday!</span></h1>
        <br><br>
        <div id="clockDiv">
          <div class="timeBox">
            <span id="days" class="smalltext"></span>
            <div class="smalltext getBold">Days</div>
          </div>
          <div class="timeBox">
            <span id="hours" class="smalltext"></span>
            <div class="smalltext getBold">Hours</div>
          </div>
          <div class="timeBox">
            <span id="minutes" class="smalltext"></span>
            <div class="smalltext getBold">Minutes</div>
          </div>
          <div class="timeBox">
            <span id="seconds" class="smalltext"></span>
            <div class="smalltext getBold">Seconds</div>
          </div>
          <h2 id="end"></h2>
      </div>
    </div>

    <script>
      let myFunction;
      setTimer();
      function setTimer() 
      {
        clearInterval(myFunction);

        let timerMonth = "1";
        let timerDay = "17";
        const currentDate = new Date();
        const currentYear = currentDate.getFullYear();
        const ThisBirthday = new Date(currentYear, timerMonth - 1, timerDay);

        if (currentDate > ThisBirthday) 
        {
          years23 = currentYear + 1;
        } 
        else 
        {
          years23 = currentYear;
        }
      
        let timerYear = years23.toString();
        let timerHour = "0";
        let timerMin = "0";

        if (timerHour == "") 
        {
          timerHour = 0;
        }

        if (timerMin == "") 
        {
          timerMin = 0;
        }

        let countdown =
          timerMonth +
          "/" +
          timerDay +
          "/" +
          timerYear +
          "/" +
          timerHour +
          ":" +
          timerMin;
        let countdownDate = new Date(countdown);
        let second = 1000;
        let minute = second * 60;
        let hour = minute * 60;
        let day = hour * 24;

        function showTimer() 
        {
          let now = new Date();
          let timeLeft = countdownDate - now;
          let days = Math.floor(timeLeft / day);
          let hours = Math.floor((timeLeft % day) / hour);
          let minutes = Math.floor((timeLeft % hour) / minute);
          let seconds = Math.floor((timeLeft % minute) / second);

          document.getElementById("days").innerHTML = days;
          document.getElementById("hours").innerHTML = hours;
          document.getElementById("minutes").innerHTML = minutes;
          document.getElementById("seconds").innerHTML = seconds;

          document.getElementById("end").innerHTML = "";

          if (timeLeft < 0 || days == 364)
          {
            clearInterval(myFunction);
            document.getElementById("end").innerHTML = "Happy Birthday Pradyumna!";
            document.body.style.backgroundImage = "url('blast.gif')";
            document.getElementById("days").innerHTML = "0";
            document.getElementById("hours").innerHTML = "0";
            document.getElementById("minutes").innerHTML = "0";
            document.getElementById("seconds").innerHTML = "0";
          }
        }

        myFunction = setInterval(showTimer, 1000);
      }
    </script>
  </body>
</html>
